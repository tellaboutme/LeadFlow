name: Set up LeadFlow toolchain
description: Install uv/Python and Node with cached dependencies, so jobs do not each repeat this setup.

inputs:
  backend:
    description: Install backend Python dependencies.
    required: false
    default: "true"
  frontend:
    description: Install frontend Node dependencies.
    required: false
    default: "true"
  playwright:
    description: Install the Chromium browser used by the E2E and accessibility suites.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install uv
      if: inputs.backend == 'true'
      uses: astral-sh/setup-uv@v6
      with:
        python-version: "3.12"
        enable-cache: true
        cache-dependency-glob: backend/uv.lock

    - name: Install backend dependencies
      if: inputs.backend == 'true'
      shell: bash
      working-directory: backend
      # --frozen fails if uv.lock is out of date with pyproject.toml, so a
      # forgotten lockfile update cannot slip through CI.
      run: uv sync --frozen

    - name: Install Node
      if: inputs.frontend == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      if: inputs.frontend == 'true'
      shell: bash
      working-directory: frontend
      run: npm ci

    - name: Install Playwright browser
      if: inputs.playwright == 'true'
      shell: bash
      working-directory: frontend
      run: npx playwright install --with-deps chromium
