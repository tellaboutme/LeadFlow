version: 2

updates:
  - package-ecosystem: uv
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels: [dependencies, backend]
    groups:
      # One PR for routine patch/minor bumps keeps the review queue small;
      # majors still arrive separately because they can break the build.
      backend-minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    labels: [dependencies, frontend]
    groups:
      frontend-minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "ci(deps)"
    labels: [dependencies, ci]

  - package-ecosystem: docker
    directories:
      - /backend
      - /frontend
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(deps)"
    labels: [dependencies, docker]
