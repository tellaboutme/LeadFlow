# Job names are contractual: the required status checks are
# "Security / dependency-review", "Security / codeql" and "Security / trivy"
# The audit, zap and sbom jobs are
# additional and not gating.
name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly, so newly disclosed CVEs in unchanged dependencies still surface.
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: dependency-review
    # Compares the PR's dependency changes against the base branch, so it has
    # nothing to diff on a push or a schedule.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  codeql:
    name: codeql
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      actions: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v4

      - name: Initialise CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Analyse
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}

  trivy:
    name: trivy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Scan the repository filesystem
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-fs.sarif
          # Findings are reported to code scanning rather than failing the build
          # here; the gate below fails only on fixable CRITICAL issues.
          exit-code: "0"

      - name: Build the images
        run: docker compose build

      # Image scans report fixable findings only. Base images always carry some
      # unfixable CVEs, and alerting on those just buries the actionable ones —
      # the weekly schedule re-scans, so they surface as soon as a fix ships.
      - name: Scan the backend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: leadflow-backend:local
          ignore-unfixed: true
          format: sarif
          output: trivy-backend.sarif
          exit-code: "0"

      - name: Scan the frontend image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: leadflow-frontend:local
          ignore-unfixed: true
          format: sarif
          output: trivy-frontend.sarif
          exit-code: "0"

      # Each scan needs its own category: code scanning rejects several SARIF
      # runs uploaded under the same one.
      - name: Upload the filesystem scan
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Upload the backend image scan
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-image-backend

      - name: Upload the frontend image scan
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-image-frontend

      # Both images gate, not just the backend: an earlier version of this
      # workflow checked only one, and let fixable HIGH/CRITICAL CVEs in the
      # frontend's Alpine base (zlib, nghttp2, musl) through unnoticed.
      - name: Fail on fixable high or critical vulnerabilities (backend)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: leadflow-backend:local
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"

      - name: Fail on fixable high or critical vulnerabilities (frontend)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: leadflow-frontend:local
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "1"

  audit:
    name: audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-stack

      - name: Audit Python dependencies
        working-directory: backend
        run: |
          uv export --frozen --no-dev --no-emit-project --format requirements-txt > requirements.txt
          uvx pip-audit --requirement requirements.txt

      # The shipped bundle contains production dependencies only, so those gate.
      - name: Audit production Node dependencies
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high

      # Dev-only advisories (build/test tooling that never reaches a user) are
      # reported for visibility but do not block the build.
      - name: Audit all Node dependencies (advisory)
        working-directory: frontend
        continue-on-error: true
        run: npm audit

  zap:
    name: zap
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # Scanning our own stack, running on the runner, with mocked providers:
      # no third-party system is ever touched.
      - name: Start the stack
        run: |
          docker compose up -d --build
          timeout 120 sh -c 'until curl -fsS http://localhost:8080/ >/dev/null; do sleep 2; done'
          timeout 120 sh -c 'until curl -fsS http://localhost:8000/api/v1/health >/dev/null; do sleep 2; done'

      # v0.12 uploads its report through the retired artifact API and fails on
      # that alone, even when the scan itself passes.
      - name: ZAP baseline scan (web app)
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: http://localhost:8080
          allow_issue_writing: false
          # Advisory: a baseline scan flags informational hardening items that
          # should not block a merge on their own.
          fail_action: false
          artifact_name: zap-baseline

      - name: ZAP API scan (OpenAPI)
        uses: zaproxy/action-api-scan@v0.10.0
        with:
          target: http://localhost:8000/openapi.json
          format: openapi
          allow_issue_writing: false
          fail_action: false
          artifact_name: zap-api

      - name: Stop the stack
        if: always()
        run: docker compose down -v

  sbom:
    name: sbom
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Build the images
        run: docker compose build

      - name: Generate the backend SBOM
        uses: anchore/sbom-action@v0
        with:
          image: leadflow-backend:local
          format: cyclonedx-json
          artifact-name: sbom-backend.cyclonedx.json
          output-file: sbom-backend.cyclonedx.json

      - name: Generate the frontend SBOM
        uses: anchore/sbom-action@v0
        with:
          image: leadflow-frontend:local
          format: cyclonedx-json
          artifact-name: sbom-frontend.cyclonedx.json
          output-file: sbom-frontend.cyclonedx.json
