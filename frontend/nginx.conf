server {
    # nginx-unprivileged runs as a non-root user, so it cannot bind port 80.
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Do not advertise the nginx version in the Server header.
    server_tokens off;

    include /etc/nginx/snippets/security-headers.conf;

    # The app calls the API with relative URLs (VITE_API_BASE_URL is empty), so
    # proxying /api here keeps everything same-origin — no CORS, mirroring the
    # Vite dev/preview proxy the app already uses locally.
    location /api/ {
        # Resolving through Docker's embedded DNS at request time (rather than
        # baking the address in at startup) means nginx still starts if the
        # backend is not up yet, and picks up its new address if it restarts.
        resolver 127.0.0.11 valid=10s;
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    # Hashed asset filenames are immutable, so they can be cached indefinitely.
    location /assets/ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, immutable, max-age=31536000" always;
    }

    # index.html must never be cached, or clients pin themselves to a stale
    # bundle after a deploy. try_files below lands here, so the security headers
    # have to be re-included.
    location = /index.html {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-store" always;
    }

    # Client-side routing: unknown paths are app routes, not 404s.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
