# nginx only inherits add_header from an outer level when the inner level
# declares no add_header of its own. The locations below set their own
# Cache-Control, so they would silently drop every security header unless these
# are re-included there — hence a shared snippet rather than a server-level block.

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# The app needs none of these capabilities, so deny them outright.
add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

# Cross-origin isolation. Every subresource the app loads is same-origin, so
# require-corp costs nothing here and blocks cross-origin embedding outright.
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
add_header Cross-Origin-Embedder-Policy "require-corp" always;

# The bundle loads scripts, styles, fonts and the API from this origin only.
# style-src needs 'unsafe-inline' because Radix and Recharts set inline style
# attributes at runtime; scripts have no such need, so they stay locked down.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
